<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The World Has Fallen</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

video {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.content {
    position: relative;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

h1 {
    font-size: 60px;
    letter-spacing: 5px;
}

p {
    font-size: 20px;
    margin-top: 10px;
}

button {
    margin-top: 30px;
    padding: 15px 40px;
    font-size: 18px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}

button:hover {
    background: darkred;
}
</style>
</head>

<body>

<video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-dark-city-skyline-5170/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="content">
    <h1>THE WORLD HAS FALLEN</h1>
    <p>Survive. Adapt. Dominate.</p>
    <button>Wishlist Soon</button>
</div>

</body>
</html>
