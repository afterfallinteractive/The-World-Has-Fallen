<!DOCTYPE html>
<html>
<head>
    <title>The World Has Fallen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #0a0a0a, #1a1a1a);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        .container {
            padding-top: 150px;
        }

        h1 {
            font-size: 60px;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: normal;
            color: #aaaaaa;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background-color: #b30000;
            color: white;
            text-decoration: none;
            font-size: 18px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #ff0000;
            transform: scale(1.05);
        }

        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>THE WORLD HAS FALLEN</h1>
        <h2>Survive. Adapt. Dominate.</h2>

        <a href="#" class="btn">Wishlist Soon</a>
    </div>

    <footer>
        © 2026 Afterfall Interactive
    </footer>

</body>
</html>
